<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Dost - AI Online</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #12141c; color: #f5f6fa; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 450px; height: 90vh; background-color: #1a1d29; border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #2a2f42; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .chat-header { padding: 20px; background-color: #222738; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #2a2f42; }
        .avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #3a8ff7, #2454ff); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .header-info h2 { font-size: 16px; font-weight: 600; }
        .header-info span { font-size: 12px; color: #4cd137; display: flex; align-items: center; gap: 4px; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .bot { background-color: #292f45; align-self: flex-start; border-bottom-left-radius: 2px; color: #e1e7f5; }
        .user { background-color: #1b62cd; align-self: flex-end; border-bottom-right-radius: 2px; color: #ffffff; }
        .input-area { padding: 15px; background-color: #222738; display: flex; gap: 10px; border-top: 1px solid #2a2f42; }
        .input-area input { flex: 1; padding: 12px; border: 1px solid #323952; border-radius: 24px; background-color: #12141c; color: white; outline: none; font-size: 14px; }
        .input-area input:focus { border-color: #1b62cd; }
        .input-area button { background-color: #1b62cd; border: none; color: white; padding: 0 20px; border-radius: 24px; cursor: pointer; font-weight: 600; font-size: 14px; transition: background 0.2s; }
        .input-area button:hover { background-color: #2475f1; }
        .input-area button:disabled { background-color: #4a536e; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="avatar">🎓</div>
        <div class="header-info">
            <h2>College Dost</h2>
            <span>● AI Online</span>
        </div>
    </div>
    
    <div class="chat-box" id="chatBox">
        <div class="message bot">👋 Hello! I'm @collegedost. How can I help you with admissions, fees, or courses today?</div>
    </div>
    
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Message @collegedost..." onkeypress="handleKeyPress(event)">
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function appendMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender);
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }

    async function sendMessage() {
        const query = userInput.value.trim();
        if (!query) return;

        appendMessage(query, 'user');
        userInput.value = '';
        
        userInput.disabled = true;
        sendBtn.disabled = true;

        // Visual loading indicator placeholder
        const loadingDiv = document.createElement('div');
        loadingDiv.classList.add('message', 'bot');
        loadingDiv.innerText = "Typing...";
        chatBox.appendChild(loadingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: query })
            });
            const data = await response.json();
            
            chatBox.removeChild(loadingDiv);
            appendMessage(data.answer, 'bot');
        } catch (error) {
            chatBox.removeChild(loadingDiv);
            appendMessage("An error communication response error occurred. Please try again.", 'bot');
        } finally {
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    }
</script>
</body>
</html>
